name: '📝 Create/Update Release Draft & Release Bump PR'

on:
  push:
    branches:
      - master
    paths-ignore:
      - build.yaml
  workflow_dispatch:
  repository_dispatch:
    types:
      - update-prep-command

jobs:
  call:
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/changelog.yaml@91aa56610cd3321f8897bbe2657c1743b3df3436
    with:
      repository-name: pietermn/Jellyfin.Xtream
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
