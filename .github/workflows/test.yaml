name: '🧪 Test Plugin'

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/validate-release-metadata.sh
  call:
    needs: metadata
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/test.yaml@91aa56610cd3321f8897bbe2657c1743b3df3436
    with:    
      dotnet-version: 9.0.x
