# Allows for the definition of PR and Issue /commands
name: '📟 Slash Command Dispatcher'

on:
  issue_comment:
    types:
      - created

jobs:
  call:
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/command-dispatch.yaml@91aa56610cd3321f8897bbe2657c1743b3df3436
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
