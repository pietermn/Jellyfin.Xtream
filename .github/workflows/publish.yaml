name: "🚀 Publish Plugin"

on:
  release:
    types:
      - released
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate release metadata
        run: ./scripts/validate-release-metadata.sh "${{ github.event.release.tag_name || github.ref_name }}"
  build:
    needs: validate
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/build.yaml@91aa56610cd3321f8897bbe2657c1743b3df3436
    with:
      dotnet-version: "9.0.*"
      dotnet-target: "net9.0"
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - build
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v8
        with:
          name: build-artifact
      - name: Prepare GitHub Release assets
        run: |-
          for file in ./*; do
            md5sum ${file#./} >> ${file%.*}.md5
            sha256sum ${file#./} >> ${file%.*}.sha256
          done
          ls -l
      - name: Resolve GitHub Release
        id: release
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
        with:
          script: |-
            if (context.payload.release?.upload_url) {
              core.setOutput('upload_url', context.payload.release.upload_url);
              return;
            }

            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: process.env.RELEASE_TAG,
            });
            core.setOutput('upload_url', release.upload_url);
      - name: Upload GitHub Release assets
        uses: shogo82148/actions-upload-release-asset@v1.10.2
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: ./*
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - upload
    steps:
      - name: Jellyfin plugin repo
        uses: Kevinjil/jellyfin-plugin-repo-action@v0.4.3
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
